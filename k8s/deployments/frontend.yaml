apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: temperaturaapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: frontend:local
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        resources:
          requests: { memory: 64Mi, cpu: 50m }
          limits:   { memory: 128Mi, cpu: 200m }
