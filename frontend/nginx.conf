server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/weather/ { proxy_pass http://api-weather:8080/; }
    location /api/location/ { proxy_pass http://api-location:8080/; }
    location /api/person/   { proxy_pass http://api-person:8080/; }
    location /api/orders/   { proxy_pass http://api-orders:8080/; }
}
