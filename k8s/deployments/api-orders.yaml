apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-orders
  namespace: temperaturaapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-orders
  template:
    metadata:
      labels:
        app: api-orders
    spec:
      containers:
      - name: api-orders
        image: api-orders:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@rabbitmq:5672"
        - name: SQLITE_PATH
          value: "/data/orders.db"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4318"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        volumeMounts:
        - name: sqlite-data
          mountPath: /data
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests: { memory: 256Mi, cpu: 200m }
          limits:   { memory: 512Mi, cpu: 1000m }
      volumes:
      - name: sqlite-data
        persistentVolumeClaim:
          claimName: sqlite-data-pvc
